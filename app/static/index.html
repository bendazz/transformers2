<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Vocabulary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Character Vocabulary</h1>
    <p id="status">Loading...</p>
    <div id="vocab-grid"></div>

    <h2>Try encoding some text</h2>
    <form id="encode-form">
        <input type="text" id="encode-input" placeholder="Type anything...">
        <button type="submit">Encode</button>
    </form>
    <div id="encode-result"></div>

    <script src="script.js"></script>
</body>
</html>
